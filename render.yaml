databases:
  - name: api-rest-db
    databaseName: api_db
    user: api_user
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: node-apirest-fullstack
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: api-rest-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "10"
      - key: ALLOWED_ORIGINS
        value: https://frontend-delta-wine-78.vercel.app
